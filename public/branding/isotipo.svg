<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Machu Picchu inspired mountain + sun icon -->
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6B37F"/>
      <stop offset="100%" stop-color="#B8945E"/>
    </linearGradient>
  </defs>
  <!-- Sun rays outer -->
  <circle cx="100" cy="58" r="28" stroke="url(#gold-grad)" stroke-width="2.5" fill="none"/>
  <!-- Sun inner circle -->
  <circle cx="100" cy="58" r="18" fill="url(#gold-grad)"/>
  <!-- Sun face lines -->
  <line x1="88" y1="50" x2="112" y2="50" stroke="#0F0F0F" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="91" y1="58" x2="109" y2="58" stroke="#0F0F0F" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="95" y1="65" x2="100" y2="62" stroke="#0F0F0F" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="62" x2="105" y2="65" stroke="#0F0F0F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mountain silhouette - Machu Picchu style -->
  <path d="M30 160 L60 95 L78 120 L100 72 L122 110 L140 88 L170 160 Z" fill="url(#gold-grad)" opacity="0.9"/>
  <!-- Mountain outline -->
  <path d="M30 160 L60 95 L78 120 L100 72 L122 110 L140 88 L170 160" stroke="url(#gold-grad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- Terraces detail -->
  <line x1="70" y1="120" x2="90" y2="120" stroke="#0F0F0F" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="130" x2="95" y2="130" stroke="#0F0F0F" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="140" x2="110" y2="140" stroke="#0F0F0F" stroke-width="1" opacity="0.4"/>
  <!-- Base line -->
  <line x1="20" y1="162" x2="180" y2="162" stroke="#D6B37F" stroke-width="1.5" opacity="0.5"/>
</svg>
